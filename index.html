<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Magic v3 - Bold Edition</title>
  <style>
    :root { --neon: #00f2ff; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
    #app { position: fixed; inset: 0; z-index: 1; }
    video { display: none; }
    
    .ui-layer {
      position: fixed; inset: 0; z-index: 10; pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between; padding: 30px;
    }
    
    .glass {
      pointer-events: auto; background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px; padding: 20px; color: white;
    }

    #startBtn {
      background: var(--neon); color: black; border: none; padding: 15px 30px;
      border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 16px;
    }

    .guide-box { font-size: 14px; line-height: 1.6; align-self: flex-start; }
    .guide-box b { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

    #status { font-size: 12px; margin-top: 10px; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="app"></div>
  <video id="video" autoplay playsinline muted></video>

  <div class="ui-layer">
    <div class="glass" style="width: fit-content;">
      <button id="startBtn">START CAMERA</button>
      <div id="status">Status: Menunggu Kamera...</div>
    </div>

    <div class="glass guide-box">
      <b>✊ GENGGAM</b> : ❤ (LOVE)<br>
      <b>☝ 1 JARI</b> : LOVE YOU<br>
      <b>✌ 2 JARI</b> : © COPYRIGHT<br>
      <b>🤟 3 JARI</b> : DWI CUYY<br>
      <b>✋ 5 JARI</b> : LANJUT
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18";

    // --- CONFIG ---
    const P_COUNT = 2000; // Jumlah partikel cukup banyak
    let scene, camera, renderer, points, geometry;
    let targets = [], velocities = [];
    let currentMode = "idle";

    // --- INIT THREE.JS ---
    function init() {
      scene = new THREE.Scene();
      const aspect = window.innerWidth / window.innerHeight;
      camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 10);
      camera.position.z = 1;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.getElementById("app").appendChild(renderer.domElement);

      geometry = new THREE.BufferGeometry();
      const pos = new Float32Array(P_COUNT * 3);
      const cols = new Float32Array(P_COUNT * 3);

      for(let i=0; i<P_COUNT; i++) {
        targets.push(new THREE.Vector3(0,0,0));
        velocities.push(new THREE.Vector3(0,0,0));
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(cols, 3));

      // UKURAN PARTIKEL DIBUAT BESAR (0.035) agar teks padat
      const mat = new THREE.PointsMaterial({ 
        size: 0.035, 
        vertexColors: true, 
        transparent: true,
        blending: THREE.AdditiveBlending 
      });
      
      points = new THREE.Points(geometry, mat);
      scene.add(points);
      updateShape("DWI", "#ffffff");
    }

    // --- GESTURE LOGIC (ACCURATE) ---
    function checkGesture(landmarks) {
      const tips = [8, 12, 16, 20];
      const pips = [6, 10, 14, 18];
      let fingersUp = 0;

      tips.forEach((tip, i) => {
        // Jari dianggap tegak jika jarak vertikal ujung ke sendi cukup jauh
        if (landmarks[tip].y < landmarks[pips[i]].y - 0.05) fingersUp++;
      });

      // Jempol (cek jarak horizontal)
      const thumbUp = Math.abs(landmarks[4].x - landmarks[3].x) > 0.06;
      const total = fingersUp + (thumbUp ? 1 : 0);

      if (total === 0) return "love";
      if (total === 1) return "one";
      if (total === 2) return "two";
      if (total === 3) return "three";
      if (total >= 4) return "five";
      return "idle";
    }

    // --- SHAPE GENERATOR ---
    function updateShape(text, colorHex) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 1000; canvas.height = 400;
      
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // FONT SANGAT TEBAL
      ctx.font = '900 160px Arial Black, sans-serif';
      
      if (text === "❤") {
        ctx.font = '250px Arial';
        ctx.fillText('❤', 500, 200);
      } else {
        ctx.fillText(text, 500, 200);
      }

      const imgData = ctx.getImageData(0, 0, 1000, 400).data;
      const pts = [];
      for(let y=0; y<400; y+=4) {
        for(let x=0; x<1000; x+=4) {
          if(imgData[(y*1000+x)*4 + 3] > 128) {
            pts.push({
              x: (x/1000 - 0.5) * 2.2, // Skala lebar teks
              y: (0.5 - y/400) * 0.9   // Skala tinggi teks
            });
          }
        }
      }

      const color = new THREE.Color(colorHex);
      const colAttr = geometry.attributes.color.array;

      for(let i=0; i<P_COUNT; i++) {
        const p = pts[i % pts.length] || {x: (Math.random()-0.5)*2, y:(Math.random()-0.5)*2};
        targets[i].set(p.x, p.y, 0);
        colAttr[i*3] = color.r; colAttr[i*3+1] = color.g; colAttr[i*3+2] = color.b;
      }
      geometry.attributes.color.needsUpdate = true;
    }

    // --- TRACKING ---
    let handLandmarker, video;
    async function startCamera() {
      const btn = document.getElementById("startBtn");
      const status = document.getElementById("status");
      btn.disabled = true;
      status.textContent = "Status: Loading AI...";

      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
        runningMode: "VIDEO", numHands: 1
      });

      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
      video = document.getElementById("video");
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        status.textContent = "Status: Kamera Aktif!";
        btn.style.display = "none";
        loop();
      };
    }

    function loop() {
      if(video.currentTime !== -1) {
        const res = handLandmarker.detectForVideo(video, performance.now());
        if(res.landmarks && res.landmarks.length > 0) {
          const mode = checkGesture(res.landmarks[0]);
          if(mode !== currentMode) {
            currentMode = mode;
            const map = {
              love: ["❤", "#ff0055"],
              one: ["LOVE YOU", "#00ff88"],
              two: ["© COPYRIGHT", "#ffff00"],
              three: ["DWI CUYY", "#00f2ff"],
              five: ["LANJUT", "#ff9900"],
              idle: ["DWI", "#ffffff"]
            };
            updateShape(map[mode][0], map[mode][1]);
          }
        }
      }

      const pos = geometry.attributes.position.array;
      for(let i=0; i<P_COUNT; i++) {
        velocities[i].x += (targets[i].x - pos[i*3]) * 0.05;
        velocities[i].y += (targets[i].y - pos[i*3+1]) * 0.05;
        velocities[i].multiplyScalar(0.8);
        pos[i*3] += velocities[i].x;
        pos[i*3+1] += velocities[i].y;
      }
      geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    window.onload = () => { init(); document.getElementById("startBtn").onclick = startCamera; };
  </script>
</body>
</html>
