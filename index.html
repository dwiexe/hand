<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Magic - High Precision</title>
  <style>
    :root { --accent: #00f2ff; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
    #app { position: fixed; inset: 0; z-index: 1; }
    video { display: none; }
    
    .ui {
      position: fixed; inset: 0; z-index: 10; pointer-events: none;
      color: white; padding: 25px; display: flex; flex-direction: column; justify-content: space-between;
    }
    
    .card {
      pointer-events: auto; background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.3);
      border-radius: 20px; padding: 20px; width: fit-content;
    }

    button {
      background: var(--accent); color: #000; border: none;
      padding: 12px 24px; border-radius: 10px; font-weight: bold;
      cursor: pointer; transition: 0.2s;
    }
    button:disabled { background: #444; color: #888; }
    
    .status { margin-top: 10px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: red; }
    .dot.on { background: #00ff00; box-shadow: 0 0 8px #00ff00; }

    .guide { align-self: flex-end; font-size: 13px; line-height: 1.8; border-left: 3px solid var(--accent); padding-left: 15px; }
    b { color: var(--accent); }
  </style>
</head>
<body>
  <div id="app"></div>
  <video id="video" autoplay playsinline muted></video>

  <div class="ui">
    <div class="card">
      <h2 style="margin:0 0 10px 0; font-size: 18px;">Gesture Control v2.0</h2>
      <button id="startBtn">NYALAKAN KAMERA</button>
      <div class="status"><div id="dot" class="dot"></div> <span id="msg">Kamera Offline</span></div>
    </div>

    <div class="card guide">
      <b>Genggam:</b> Love (Hati)<br>
      <b>1 Jari:</b> LOVE YOU<br>
      <b>2 Jari:</b> © COPYRIGHT<br>
      <b>3 Jari:</b> DWI CUYY<br>
      <b>5 Jari:</b> LANJUT
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18";

    // --- SETUP PARTIKEL (DIPERBANYAK) ---
    const P_COUNT = 1500; // Jumlah partikel lebih banyak agar tulisan jelas
    let scene, camera, renderer, points, geometry;
    let targets = [], velocities = [];
    let currentMode = "idle";

    function initThree() {
      scene = new THREE.Scene();
      const aspect = window.innerWidth / window.innerHeight;
      camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 10);
      camera.position.z = 1;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById("app").appendChild(renderer.domElement);

      geometry = new THREE.BufferGeometry();
      const pos = new Float32Array(P_COUNT * 3);
      const cols = new Float32Array(P_COUNT * 3);

      for(let i=0; i<P_COUNT; i++) {
        targets.push(new THREE.Vector3(0,0,0));
        velocities.push(new THREE.Vector3(0,0,0));
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(cols, 3));

      // Ukuran partikel diperbesar agar lebih terlihat
      const mat = new THREE.PointsMaterial({ 
        size: 0.022, 
        vertexColors: true, 
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending 
      });
      
      points = new THREE.Points(geometry, mat);
      scene.add(points);
      updateShape("DWI", "#00f2ff");
    }

    // --- LOGIKA SENSOR (LEBIH AKURAT) ---
    function analyzeHand(landmarks) {
      // Landmark jari: 8(telunjuk), 12(tengah), 16(manis), 20(kelingking)
      // Dibandingkan dengan PIP (sendi tengah) masing-masing
      const tips = [8, 12, 16, 20];
      const pips = [6, 10, 14, 18];
      
      let up = [];
      for(let i=0; i<4; i++) {
        // Jari dianggap tegak jika ujungnya jauh lebih tinggi (nilai Y lebih kecil) dari sendi
        if (landmarks[tips[i]].y < landmarks[pips[i]].y - 0.02) {
          up.push(true);
        } else {
          up.push(false);
        }
      }

      const upCount = up.filter(Boolean).length;
      
      // Deteksi Genggam (Semua jari tertutup)
      if (upCount === 0) return "love";
      // Deteksi 1 Jari (Hanya telunjuk)
      if (upCount === 1 && up[0]) return "one";
      // Deteksi 2 Jari (Telunjuk & Tengah)
      if (upCount === 2 && up[0] && up[1]) return "two";
      // Deteksi 3 Jari
      if (upCount === 3 && up[0] && up[1] && up[2]) return "three";
      // Deteksi 5 Jari (Semua terbuka)
      if (upCount === 4) return "five";
      
      return "idle";
    }

    // --- GENERATOR BENTUK (LEBIH TAJAM) ---
    function updateShape(text, colorHex) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 1200; canvas.height = 500;
      
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // Menggunakan font yang lebih tebal
      ctx.font = 'black 180px Arial Black, sans-serif';
      
      if (text === "❤") {
        ctx.font = '300px Arial';
        ctx.fillText('❤', 600, 250);
      } else {
        ctx.fillText(text, 600, 250);
      }

      const imgData = ctx.getImageData(0, 0, 1200, 500).data;
      const pts = [];
      // Sampling lebih rapat
      for(let y=0; y<500; y+=4) {
        for(let x=0; x<1200; x+=4) {
          if(imgData[(y*1200+x)*4 + 3] > 150) {
            pts.push({
              x: (x/1200 - 0.5) * 2.5,
              y: (0.5 - y/500) * 1.0
            });
          }
        }
      }

      const color = new THREE.Color(colorHex);
      const colAttr = geometry.attributes.color.array;

      for(let i=0; i<P_COUNT; i++) {
        const p = pts[i % pts.length] || {x:0, y:0};
        targets[i].set(p.x, p.y, 0);
        colAttr[i*3] = color.r; 
        colAttr[i*3+1] = color.g; 
        colAttr[i*3+2] = color.b;
      }
      geometry.attributes.color.needsUpdate = true;
    }

    // --- CAMERA & TRACKING ---
    let handLandmarker, video;

    async function startApp() {
      const startBtn = document.getElementById("startBtn");
      const msg = document.getElementById("msg");
      const dot = document.getElementById("dot");

      try {
        startBtn.disabled = true;
        msg.textContent = "Loading AI...";
        
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
          runningMode: "VIDEO", numHands: 1
        });

        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
        video.srcObject = stream;
        
        video.onloadedmetadata = () => {
          video.play();
          dot.classList.add('on');
          msg.textContent = "Sistem Aktif";
          startBtn.style.display = "none";
          renderLoop();
        };
      } catch (err) {
        msg.textContent = "Error: " + err.message;
        startBtn.disabled = false;
      }
    }

    function renderLoop() {
      // Deteksi Tangan
      if(video.currentTime !== -1) {
        const result = handLandmarker.detectForVideo(video, performance.now());
        if(result.landmarks && result.landmarks.length > 0) {
          const mode = analyzeHand(result.landmarks[0]);
          if(mode !== currentMode) {
            currentMode = mode;
            const config = {
              love: ["❤", "#ff0055"],
              one: ["LOVE YOU", "#00ff88"],
              two: ["© COPYRIGHT", "#ffff00"],
              three: ["DWI CUYY", "#00f2ff"],
              five: ["LANJUT", "#ff9900"],
              idle: ["DWI", "#ffffff"]
            };
            updateShape(config[mode][0], config[mode][1]);
          }
        }
      }

      // Animasi Partikel
      const pos = geometry.attributes.position.array;
      for(let i=0; i<P_COUNT; i++) {
        // Efek tarikan magnet ke target
        velocities[i].x += (targets[i].x - pos[i*3]) * 0.04;
        velocities[i].y += (targets[i].y - pos[i*3+1]) * 0.04;
        
        // Gesekan (Friction)
        velocities[i].multiplyScalar(0.8);

        pos[i*3] += velocities[i].x;
        pos[i*3+1] += velocities[i].y;
      }
      geometry.attributes.position.needsUpdate = true;
      
      renderer.render(scene, camera);
      requestAnimationFrame(renderLoop);
    }

    window.onload = () => {
      video = document.getElementById("video");
      initThree();
      document.getElementById("startBtn").onclick = startApp;
    };
  </script>
</body>
</html>
