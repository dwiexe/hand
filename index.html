<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Magic - Ultra Bold</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #app { position: fixed; inset: 0; z-index: 1; }
    video { display: none; }
    .ui {
      position: fixed; inset: 0; z-index: 10; pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between; padding: 30px;
      color: white; font-family: sans-serif;
    }
    .glass {
      pointer-events: auto; background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.2);
    }
    button {
      background: #00f2ff; color: black; border: none; padding: 12px 25px;
      border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    .guide { font-size: 13px; line-height: 1.6; align-self: flex-start; }
    b { color: #00f2ff; }
  </style>
</head>
<body>
  <div id="app"></div>
  <video id="video" autoplay playsinline muted></video>
  <div class="ui">
    <div class="glass" style="width: fit-content;">
      <button id="startBtn">AKTIFKAN KAMERA</button>
      <div id="status" style="margin-top: 8px; font-size: 11px; opacity: 0.8;">Siap digunakan.</div>
    </div>
    <div class="glass guide">
      <b>✊ GENGGAM</b> : ❤ LOVE<br>
      <b>☝ 1 JARI</b> : LOVE YOU<br>
      <b>✌ 2 JARI</b> : © COPYRIGHT<br>
      <b>🤟 3 JARI</b> : DWI CUYY<br>
      <b>✋ 5 JARI</b> : LANJUT
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18";

    const P_COUNT = 3000; // Ditambah agar sangat padat
    let scene, camera, renderer, points, geometry;
    let targets = [], velocities = [];
    let currentMode = "idle";

    function init() {
      scene = new THREE.Scene();
      const aspect = window.innerWidth / window.innerHeight;
      camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 10);
      camera.position.z = 1;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById("app").appendChild(renderer.domElement);

      geometry = new THREE.BufferGeometry();
      const pos = new Float32Array(P_COUNT * 3);
      const cols = new Float32Array(P_COUNT * 3);

      for(let i=0; i<P_COUNT; i++) {
        targets.push(new THREE.Vector3(0,0,0));
        velocities.push(new THREE.Vector3(0,0,0));
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(cols, 3));

      // SHADER MATERIAL UNTUK PARTIKEL BULAT & BERCORAK
      const mat = new THREE.ShaderMaterial({
        vertexColors: true,
        transparent: true,
        blending: THREE.AdditiveBlending,
        vertexShader: `
          varying vec3 vColor;
          void main() {
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = (45.0 / -mvPosition.z); // Ukuran lebih besar & konsisten
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          void main() {
            float d = distance(gl_PointCoord, vec2(0.5));
            if (d > 0.5) discard;
            float glow = pow(1.0 - d * 2.0, 2.0);
            gl_FragColor = vec4(vColor, glow);
          }
        `
      });
      
      points = new THREE.Points(geometry, mat);
      scene.add(points);
      updateShape("DWI", "#ffffff");
    }

    function checkGesture(landmarks) {
      const tips = [8, 12, 16, 20];
      const pips = [6, 10, 14, 18];
      let fingersUp = 0;
      tips.forEach((tip, i) => {
        if (landmarks[tip].y < landmarks[pips[i]].y - 0.05) fingersUp++;
      });
      const thumbUp = Math.abs(landmarks[4].x - landmarks[3].x) > 0.07;
      const total = fingersUp + (thumbUp ? 1 : 0);

      if (total === 0) return "love";
      if (total === 1) return "one";
      if (total === 2) return "two";
      if (total === 3) return "three";
      if (total >= 4) return "five";
      return "idle";
    }

    function updateShape(text, colorHex) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 1200; canvas.height = 400;
      
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '900 180px Arial Black'; // Font tebal
      
      if (text === "❤") {
        ctx.font = '300px Arial';
        ctx.fillText('❤', 600, 200);
      } else {
        ctx.fillText(text, 600, 200);
      }

      const imgData = ctx.getImageData(0, 0, 1200, 400).data;
      const pts = [];
      for(let y=0; y<400; y+=3) { // Sampling lebih rapat
        for(let x=0; x<1200; x+=3) {
          if(imgData[(y*1200+x)*4 + 3] > 128) {
            pts.push({
              x: (x/1200 - 0.5) * (window.innerWidth/window.innerHeight) * 1.8,
              y: (0.5 - y/400) * 0.8
            });
          }
        }
      }

      const color = new THREE.Color(colorHex);
      const colAttr = geometry.attributes.color.array;

      for(let i=0; i<P_COUNT; i++) {
        const p = pts[i % pts.length] || {x: 0, y: 0};
        // Menambahkan JITTER agar partikel menyebar alami, tidak bergaris
        targets[i].set(
          p.x + (Math.random() - 0.5) * 0.02, 
          p.y + (Math.random() - 0.5) * 0.02, 
          0
        );
        colAttr[i*3] = color.r; colAttr[i*3+1] = color.g; colAttr[i*3+2] = color.b;
      }
      geometry.attributes.color.needsUpdate = true;
    }

    let handLandmarker, video;
    async function startCamera() {
      const status = document.getElementById("status");
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
        runningMode: "VIDEO", numHands: 1
      });

      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
      video = document.getElementById("video");
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        status.textContent = "Kamera Aktif!";
        document.getElementById("startBtn").style.display = "none";
        loop();
      };
    }

    function loop() {
      if(video.currentTime !== -1) {
        const res = handLandmarker.detectForVideo(video, performance.now());
        if(res.landmarks && res.landmarks.length > 0) {
          const mode = checkGesture(res.landmarks[0]);
          if(mode !== currentMode) {
            currentMode = mode;
            const map = {
              love: ["❤", "#ff0055"],
              one: ["LOVE YOU", "#00ff88"],
              two: ["© COPYRIGHT", "#ffff00"],
              three: ["DWI CUYY", "#00f2ff"],
              five: ["LANJUT", "#ff9900"],
              idle: ["DWI", "#ffffff"]
            };
            updateShape(map[mode][0], map[mode][1]);
          }
        }
      }

      const pos = geometry.attributes.position.array;
      for(let i=0; i<P_COUNT; i++) {
        velocities[i].x += (targets[i].x - pos[i*3]) * 0.07;
        velocities[i].y += (targets[i].y - pos[i*3+1]) * 0.07;
        velocities[i].multiplyScalar(0.75);
        pos[i*3] += velocities[i].x;
        pos[i*3+1] += velocities[i].y;
      }
      geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    window.onload = () => { init(); document.getElementById("startBtn").onclick = startCamera; };
  </script>
</body>
</html>
